<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="个人主站首页，用于展示独立项目、互动页面和内容入口。">
    <title>个人主站</title>
    <link rel="stylesheet" href="assets/css/site.css">
</head>
<body>
    <div class="site-shell">
        <header class="site-header">
            <div class="brand-block">
                <p class="eyebrow">Portfolio</p>
                <h1>作品集主页</h1>
                <p class="lead">
                    这里用于整理我持续制作的页面实验、互动练习和独立小项目。每个页面都保留独立链接，首页只负责简洁地呈现与索引。
                </p>
                <ul class="intro-meta">
                    <li>独立页面</li>
                    <li>轻量结构</li>
                    <li>持续更新</li>
                </ul>
            </div>
            <div class="header-actions">
                <a class="button-link primary-link" href="#site-pages">查看作品</a>
            </div>
        </header>

        <main class="site-main-grid">
            <section class="content-panel intro-panel">
                <div class="section-heading">
                    <p class="eyebrow">About</p>
                    <h2>关于站点</h2>
                </div>
                <p>
                    站点采用“首页索引 + 子页面”的方式组织内容。每个项目都尽量保持清晰边界，便于独立访问、单独分享，也方便后续继续增加新的作品页。
                </p>
            </section>

            <section class="content-panel project-panel" id="site-pages">
                <div class="section-heading">
                    <p class="eyebrow">Projects</p>
                    <h2>项目列表</h2>
                </div>
                <div class="card-grid" id="page-card-list"></div>
            </section>

            <section class="content-panel note-panel">
                <div class="section-heading">
                    <p class="eyebrow">Archive</p>
                    <h2>附加信息</h2>
                </div>
                <p>后续会继续补充更多实验页面和工具页。当前首页保持极简，只展示必要说明和作品入口。</p>
            </section>
        </main>
    </div>

    <script src="assets/js/site-data.js"></script>
    <script src="assets/js/site.js"></script>
</body>
</html>
